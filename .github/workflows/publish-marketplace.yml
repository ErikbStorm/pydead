# Manual (re)publish of the latest GitHub Release VSIX to the VS Code Marketplace.
# Run from Actions → "Publish Marketplace" → Run workflow.
#
# Requires secret: VSCE_PAT (Azure DevOps PAT with Marketplace Manage)

name: Publish Marketplace

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download VSIX from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "${{ inputs.tag }}" -R "${{ github.repository }}" -p "*.vsix"
          ls -la *.vsix
          unzip -p pydead-*.vsix extension/package.json | tee /tmp/pkg.json
          node -e "const p=require('/tmp/pkg.json'); console.log('itemName=', p.publisher+'.'+p.name, 'version=', p.version)"

      - name: Diagnose publisher + publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          if [[ -z "${VSCE_PAT:-}" ]]; then
            echo "::error::VSCE_PAT secret is empty"
            exit 1
          fi
          echo "VSCE_PAT is set (length ${#VSCE_PAT})"
          npm install -g @vscode/vsce@2
          echo "== vsce ls-publishers =="
          vsce ls-publishers -p "$VSCE_PAT" || true
          echo "== vsce show pydead.pydead =="
          vsce show pydead.pydead -p "$VSCE_PAT" || true
          VSIX="$(ls -1 pydead-*.vsix | head -1)"
          echo "== publishing $VSIX =="
          # --skip-duplicate: ok if version already exists server-side but public gallery lag
          vsce publish --packagePath "$VSIX" --no-dependencies -p "$VSCE_PAT" 2>&1 || {
            echo "::warning::publish failed; trying with --skip-duplicate"
            vsce publish --packagePath "$VSIX" --no-dependencies --skip-duplicate -p "$VSCE_PAT"
          }
          echo "== vsce show after =="
          vsce show pydead.pydead -p "$VSCE_PAT" || true
